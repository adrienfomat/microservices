spring.application.name=partie-service
server.port=8082

# PostgreSQL - base de donnees dediee a CE microservice uniquement
spring.datasource.url=jdbc:postgresql://localhost:5432/motus_partie
spring.datasource.username=motus
spring.datasource.password=motus
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# adresses des autres microservices appeles en REST
services.joueur.url=http://localhost:8081
services.score.url=http://localhost:8083

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
