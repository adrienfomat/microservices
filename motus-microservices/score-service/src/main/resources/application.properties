spring.application.name=score-service
server.port=8083

# PostgreSQL - base de donnees dediee a CE microservice uniquement
spring.datasource.url=jdbc:postgresql://localhost:5432/motus_score
spring.datasource.username=motus
spring.datasource.password=motus
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# adresse du joueur-service, appele pour afficher les pseudos du classement
services.joueur.url=http://localhost:8081

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
