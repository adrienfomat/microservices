services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: motus
      POSTGRES_PASSWORD: motus
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - motus-db:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motus"]
      interval: 5s
      timeout: 3s
      retries: 10

  joueur-service:
    build:
      context: .
      dockerfile: joueur-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/motus_joueur
      SPRING_DATASOURCE_USERNAME: motus
      SPRING_DATASOURCE_PASSWORD: motus
    depends_on:
      postgres:
        condition: service_healthy

  score-service:
    build:
      context: .
      dockerfile: score-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/motus_score
      SPRING_DATASOURCE_USERNAME: motus
      SPRING_DATASOURCE_PASSWORD: motus
      SERVICES_JOUEUR_URL: http://joueur-service:8081
    depends_on:
      postgres:
        condition: service_healthy

  partie-service:
    build:
      context: .
      dockerfile: partie-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/motus_partie
      SPRING_DATASOURCE_USERNAME: motus
      SPRING_DATASOURCE_PASSWORD: motus
      SERVICES_JOUEUR_URL: http://joueur-service:8081
      SERVICES_SCORE_URL: http://score-service:8083
    depends_on:
      postgres:
        condition: service_healthy

  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - joueur-service
      - partie-service
      - score-service

volumes:
  motus-db:
